<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEFR App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); font-family: 'Inter', sans-serif; }
        .secondary-bg { background-color: var(--tg-theme-secondary-bg-color, #f3f4f6); }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">

    {% if view == 'test' %}
        <div class="text-xl font-bold mb-4 border-b pb-2">📖 {{ section | capitalize }} - Part {{ part }}</div>
        <div class="flex-1 overflow-y-auto mb-4 secondary-bg p-4 rounded-lg shadow-inner text-sm leading-relaxed">{{ data.text }}</div>
        <div class="flex-1 overflow-y-auto pb-6" id="questions-container">
            {% for question in data.questions %}
            <div class="mb-6">
                <p class="font-semibold mb-3">{{ question.id }}. {{ question.q }}</p>
                <div class="space-y-2">
                    {% for option in question.options %}
                    <label class="flex items-center space-x-3 p-3 border rounded-xl hover:bg-gray-100 cursor-pointer transition">
                        <input type="radio" name="q_{{ question.id }}" value="{{ option }}" class="form-radio h-5 w-5 text-blue-600">
                        <span>{{ option }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    {% endif %}

    {% if view == 'admin' %}
        <div class="text-2xl font-bold mb-6 border-b pb-2">📝 Yangi Material</div>
        <div class="space-y-5 overflow-y-auto flex-1 pb-6">
            <div>
                <label class="block mb-2 font-medium">Bo'lim</label>
                <select id="section" class="w-full p-3 rounded-xl border secondary-bg outline-none">
                    <option value="reading">📖 Reading</option>
                    <option value="listening">🎧 Listening</option>
                </select>
            </div>
            <div>
                <label class="block mb-2 font-medium">Matn</label>
                <textarea id="content" rows="6" class="w-full p-3 rounded-xl border secondary-bg outline-none" placeholder="Matnni kiriting..."></textarea>
            </div>
        </div>
    {% endif %}

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const viewMode = "{{ view }}"; 

        if (viewMode === 'test') {
            tg.MainButton.text = "Javoblarni Yuborish";
            tg.MainButton.show();
            tg.MainButton.onClick(() => {
                let answers = {};
                let allAnswered = true;
                const questionIds = [{% for question in data.questions %} "{{ question.id }}", {% endfor %}];

                questionIds.forEach(id => {
                    let selected = document.querySelector(`input[name="q_${id}"]:checked`);
                    if (selected) answers[id] = selected.value; else allAnswered = false;
                });

                if (!allAnswered) return tg.showAlert("Barcha savollarga javob bering!");

                fetch('/api/submit_test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: tg.initDataUnsafe?.user?.id || 0, section: "{{ section }}", part: "{{ part }}", answers: answers })
                }).then(() => tg.close()).catch(() => tg.showAlert("Xatolik yuz berdi."));
            });

        } else if (viewMode === 'admin') {
            tg.MainButton.text = "Bazaga Saqlash";
            tg.MainButton.show();
            tg.MainButton.onClick(() => {
                const section = document.getElementById('section').value;
                const content = document.getElementById('content').value;
                if(content.trim() === "") return tg.showAlert("Matn majburiy!");
                tg.sendData(JSON.stringify({ section: section, content: content })); 
            });
        }
    </script>
</body>
</html>
