<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>CEFR Test Platformasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Reading Part 1</h1>
        <div id="test-content" class="mb-6">Matn yuklanmoqda...</div>
        <div id="questions"></div>
        <button onclick="checkTest()" class="w-full bg-blue-600 text-white py-3 rounded-lg mt-4">Natijani ko'rish</button>
        <div id="result" class="mt-4 font-bold text-lg text-center"></div>
    </div>

    <script>
        // Test ma'lumotlari (buni keyinchalik API dan olishingiz mumkin)
        const testData = {
            questions: [
                { id: 1, q: "1800s yoki 1900s?", answer: "1800s" },
                { id: 2, q: "Father of computers?", answer: "Charles Babbage" }
            ]
        };

        const container = document.getElementById('questions');
        testData.questions.forEach(q => {
            container.innerHTML += `<div class="mb-4"><p>${q.q}</p><input type="text" id="q${q.id}" class="border p-2 w-full"></div>`;
        });

        function checkTest() {
            let score = 0;
            testData.questions.forEach(q => {
                if(document.getElementById(`q${q.id}`).value.trim() === q.answer) score++;
            });
            document.getElementById('result').innerText = `Siz ${score} ta to'g'ri topdingiz!`;
        }
    </script>
</body>
</html>
